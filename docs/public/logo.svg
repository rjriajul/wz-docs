<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <!-- Cloud body gradient -->
    <linearGradient id="cloudBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#e8edf5"/>
      <stop offset="100%" stop-color="#c8d0dc"/>
    </linearGradient>

    <!-- Cloud shadow gradient -->
    <linearGradient id="cloudShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0)" stop-opacity="0"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.15)" stop-opacity="0.15"/>
    </linearGradient>

    <!-- Cloud highlight -->
    <linearGradient id="cloudHighlight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Download arrow gradient -->
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>

    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#64b5f6"/>
      <stop offset="50%" stop-color="#ce93d8"/>
      <stop offset="100%" stop-color="#f06292"/>
    </linearGradient>

    <!-- Subtitle text gradient -->
    <linearGradient id="subGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#90caf9"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Drop shadow for cloud -->
    <filter id="cloudDrop" x="-10%" y="-10%" width="130%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f3460" flood-opacity="0.35"/>
    </filter>

    <!-- Soft drop shadow for arrow -->
    <filter id="arrowDrop" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0d47a1" flood-opacity="0.4"/>
    </filter>

    <!-- Text glow -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>


  </defs>

  <!-- === CLOUD === -->
  <g filter="url(#cloudDrop)">
    <!-- Cloud main body -->
    <path d="
      M 95 180
      C 95 155, 115 135, 140 135
      C 143 115, 170 100, 200 100
      C 230 100, 257 115, 260 135
      C 285 135, 305 155, 305 180
      C 305 205, 285 215, 260 215
      L 140 215
      C 115 215, 95 205, 95 180
      Z
    " fill="url(#cloudBody)"/>

    <!-- Cloud bottom shadow overlay -->
    <path d="
      M 95 180
      C 95 205, 115 215, 140 215
      L 260 215
      C 285 215, 305 205, 305 180
      C 305 190, 295 210, 260 212
      L 140 212
      C 110 210, 95 195, 95 180
      Z
    " fill="url(#cloudShadow)"/>

    <!-- Cloud highlight (top-left) -->
    <path d="
      M 105 165
      C 105 145, 125 130, 150 128
      C 155 115, 178 105, 200 105
      C 215 105, 230 110, 240 120
      C 225 110, 205 108, 190 112
      C 168 118, 150 133, 145 148
      C 130 148, 115 155, 108 168
      Z
    " fill="url(#cloudHighlight)"/>

    <!-- Cloud secondary highlight arc -->
    <path d="
      M 120 155
      C 125 140, 145 128, 170 122
      C 180 119, 195 118, 205 120
    " fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

    <!-- Cloud puff layer 1 -->
    <ellipse cx="160" cy="135" rx="38" ry="30" fill="#f0f4fa" opacity="0.3"/>

    <!-- Cloud puff layer 2 -->
    <ellipse cx="240" cy="140" rx="32" ry="25" fill="#f0f4fa" opacity="0.25"/>

    <!-- Cloud puff layer 3 -->
    <ellipse cx="200" cy="115" rx="35" ry="22" fill="#ffffff" opacity="0.2"/>
  </g>

  <!-- === DOWNLOAD ARROW === -->
  <g filter="url(#arrowDrop)">
    <!-- Arrow shaft -->
    <rect x="193" y="158" width="14" height="32" rx="4" fill="url(#arrowGrad)"/>

    <!-- Arrow head -->
    <path d="
      M 170 185
      L 200 215
      L 230 185
      Z
    " fill="url(#arrowGrad)"/>

    <!-- Arrow highlight on shaft -->
    <rect x="196" y="160" width="4" height="28" rx="2" fill="#ffffff" opacity="0.35"/>

    <!-- Arrow head highlight -->
    <path d="
      M 175 186
      L 200 210
      L 225 186
      Z
    " fill="#ffffff" opacity="0.15"/>
  </g>

  <!-- Small decorative dots around arrow -->
  <circle cx="165" cy="175" r="2" fill="#4fc3f7" opacity="0.5" filter="url(#twinkle)"/>
  <circle cx="235" cy="175" r="2" fill="#4fc3f7" opacity="0.5" filter="url(#twinkle)"/>
  <circle cx="200" cy="145" r="1.5" fill="#81d4fa" opacity="0.4" filter="url(#twinkle)"/>

  <!-- === TEXT === -->
  <g filter="url(#textGlow)">
    <!-- WZML-X main title -->
    <text x="200" y="265" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="url(#textGrad)" letter-spacing="4">
      WZML-X
    </text>
  </g>

  <!-- Subtitle -->
  <text x="200" y="286" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="url(#subGrad)" letter-spacing="6" opacity="0.8">
    TELEGRAM MIRROR / LEECH
  </text>
</svg>
