<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="favBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="favCloud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#e8edf5"/>
      <stop offset="100%" stop-color="#b0bec5"/>
    </linearGradient>
    <linearGradient id="favArrow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <filter id="favCloudDrop" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="favArrowDrop" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#0d47a1" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <rect width="64" height="64" rx="8" fill="url(#favBg)"/>

  <!-- Simplified cloud -->
  <g filter="url(#favCloudDrop)">
    <path d="
      M 16 40
      C 16 32, 22 26, 29 26
      C 31 20, 38 16, 44 16
      C 50 16, 54 20, 55 26
      C 60 26, 64 30, 64 36
      C 64 42, 60 44, 55 44
      L 22 44
      C 18 44, 16 42, 16 40
      Z
    " fill="url(#favCloud)" transform="translate(-8,2) scale(0.78)"/>

    <!-- Cloud highlight -->
    <path d="
      M 12 32
      C 12 26, 18 22, 24 21
      C 26 17, 32 14, 37 14
      C 40 14, 42 16, 43 18
      C 38 16, 32 16, 28 20
      C 24 24, 20 28, 18 33
      Z
    " fill="#ffffff" opacity="0.3" transform="translate(-8,2) scale(0.78)"/>
  </g>

  <!-- Download arrow -->
  <g filter="url(#favArrowDrop)">
    <rect x="30" y="33" width="4" height="10" rx="1.5" fill="url(#favArrow)"/>
    <path d="M 24 38 L 32 46 L 40 38 Z" fill="url(#favArrow)"/>
    <rect x="31" y="34" width="1.5" height="8" rx="0.75" fill="#ffffff" opacity="0.35"/>
  </g>
</svg>
